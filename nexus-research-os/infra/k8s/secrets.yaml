apiVersion: v1
kind: Secret
metadata:
  name: nexus-secrets
  namespace: nexus-research-os
type: Opaque
stringData:
  database-url: "postgresql+asyncpg://nexus:CHANGE_ME_PASSWORD@postgres:5432/nexus_research"
  postgres-password: "CHANGE_ME_PASSWORD"
  secret-key: "CHANGE_ME_SECRET_KEY_MIN_32_CHARS_LONG"
  neo4j-auth: "neo4j/CHANGE_ME_NEO4J_PASSWORD"
